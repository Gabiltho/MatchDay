<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept 4: Pitch / Field top-down with accent -->
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="100" cy="100" r="90" fill="#1A1A2E"/>
  <!-- Mini pitch -->
  <rect x="40" y="45" width="120" height="80" rx="3" fill="url(#grad4)" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Center line -->
  <line x1="100" y1="45" x2="100" y2="125" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <!-- Center circle -->
  <circle cx="100" cy="85" r="15" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="85" r="2.5" fill="#FFFFFF" opacity="0.6"/>
  <!-- Goal areas -->
  <rect x="40" y="65" width="18" height="40" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <rect x="142" y="65" width="18" height="40" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <!-- Live indicator dot -->
  <circle cx="160" cy="50" r="6" fill="#F44336"/>
  <circle cx="160" cy="50" r="6" fill="#F44336" opacity="0.5">
    <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Text -->
  <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#FFFFFF" letter-spacing="2">MATCH</text>
  <text x="100" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-weight="300" font-size="20" fill="#4CAF50" letter-spacing="2">DAY</text>
</svg>
